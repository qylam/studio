# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1

# Environment variables for production.
# This section maps the Secret you created in the Firebase Console to an environment variable.
# IMPORTANT: The App Hosting service account needs 'Secret Manager Secret Accessor' role
# on the GEMINI_API_KEY secret to read its value at runtime.
env:
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
